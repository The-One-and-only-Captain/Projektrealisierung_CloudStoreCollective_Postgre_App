#cloud-config

# PostgreSQL + pgAdmin Setup
# Startet beide als Docker-Container. Pro Studierendem wird eine eigene DB
# inkl. eigenem DB-User angelegt.
#
# ⚠️  HINWEIS: Self-Signed HTTPS ist hier für Testzwecke DEAKTIVIERT —
#     pgAdmin wird direkt über HTTP (Port 80) bereitgestellt.
#     Für die HTTPS-Variante siehe Git-History: nginx als Reverse-Proxy +
#     openssl Self-Signed Cert + Port 443.

package_update: true
package_upgrade: false

bootcmd:
  - mkdir -p /opt/cloudstore /etc/cloudstore /opt/pg

packages:
  - curl
  - ca-certificates
  - ufw
  - postgresql-client

write_files:
  - path: /etc/cloudstore/postgres_info.txt
    permissions: '0600'
    content: |
      CloudStore PostgreSQL + pgAdmin Deployment
      ==========================================
      App:           ${app_name}
      Public IP:     ${floating_ip}
      Postgres-Host: ${floating_ip}:5432
      pgAdmin-URL:   http://${floating_ip}

      Admin (Dozent — Postgres Superuser + pgAdmin)
      ---------------------------------------------
      DB-User:       ${admin_dbuser}
      Email:         ${admin_email}
      Password:      ${admin_password}

      Studierende (eigene DB + DB-User)
      ---------------------------------
      %{ for s in students ~}
      ${s.dbuser} / DB ${s.dbname} / ${s.email} / ${s.password}
      %{ endfor ~}

  - path: /opt/pg/docker-compose.yml
    permissions: '0644'
    content: |
      services:
        postgres:
          image: postgres:${postgres_version}
          container_name: postgres
          environment:
            POSTGRES_USER: "${admin_dbuser}"
            POSTGRES_PASSWORD: "${admin_password}"
            POSTGRES_DB: postgres
          restart: unless-stopped
          ports:
            - "5432:5432"
          volumes:
            - pg-data:/var/lib/postgresql/data
            - /opt/pg/init:/docker-entrypoint-initdb.d:ro

        pgadmin:
          image: dpage/pgadmin4:latest
          container_name: pgadmin
          depends_on:
            - postgres
          environment:
            PGADMIN_DEFAULT_EMAIL: "${admin_email}"
            PGADMIN_DEFAULT_PASSWORD: "${admin_password}"
            PGADMIN_CONFIG_SERVER_MODE: "True"
            PGADMIN_LISTEN_PORT: "80"
          restart: unless-stopped
          # ⚠️ TEST-MODUS: pgAdmin direkt auf Port 80 statt nur intern (127.0.0.1:8081).
          # Für HTTPS-Setup zurück auf "127.0.0.1:8081:80" und nginx-Block aktivieren.
          ports:
            - "80:80"
          volumes:
            - pgadmin-data:/var/lib/pgadmin

      volumes:
        pg-data:
        pgadmin-data:

  # Init-Skript: läuft beim ersten Postgres-Start, legt Studi-DBs + DB-User an
  - path: /opt/pg/init/00-students.sql
    permissions: '0644'
    content: |
      %{ for s in students ~}
      CREATE USER "${s.dbuser}" WITH PASSWORD '${s.password}';
      CREATE DATABASE "${s.dbname}" OWNER "${s.dbuser}";
      GRANT ALL PRIVILEGES ON DATABASE "${s.dbname}" TO "${s.dbuser}";
      %{ endfor ~}

  # Systemd-Unit: startet docker compose automatisch
  - path: /etc/systemd/system/cloudstore-postgres.service
    permissions: '0644'
    content: |
      [Unit]
      Description=CloudStore PostgreSQL + pgAdmin (docker compose)
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/pg
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down

      [Install]
      WantedBy=multi-user.target

runcmd:
  # UFW Firewall: SSH + HTTP + Postgres
  # ⚠️ TEST-MODUS: Port 80 statt 443. Für HTTPS-Setup 443 zusätzlich öffnen.
  - ufw --force enable
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 5432/tcp

  # Docker installieren (offizielles Convenience-Skript)
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker

  # Postgres + pgAdmin Stack starten
  - systemctl daemon-reload
  - systemctl enable cloudstore-postgres.service
  - systemctl start cloudstore-postgres.service

  # ⚠️ TEST-MODUS: Self-Signed Cert + nginx Reverse-Proxy sind deaktiviert.
  # Für HTTPS-Setup folgende Schritte aktivieren:
  #   - openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #       -keyout /etc/ssl/private/pgadmin-selfsigned.key \
  #       -out    /etc/ssl/certs/pgadmin-selfsigned.crt \
  #       -subj "/C=DE/ST=BW/L=Mannheim/O=DHBW/CN=pgadmin"
  #   - ln -sf /etc/nginx/sites-available/pgadmin /etc/nginx/sites-enabled/
  #   - rm -f /etc/nginx/sites-enabled/default
  #   - nginx -t
  #   - systemctl restart nginx
  #   - systemctl enable nginx
  # Außerdem oben in 'packages:' nginx + openssl wieder einfügen und den
  # 'write_files'-Eintrag /etc/nginx/sites-available/pgadmin wieder hinzufügen
  # (siehe Git-History für die vollständige nginx-Konfiguration).

final_message: |
  PostgreSQL ${postgres_version} + pgAdmin wurden installiert.
  App: ${app_name}
  pgAdmin: http://${floating_ip}
  Postgres: ${floating_ip}:5432
